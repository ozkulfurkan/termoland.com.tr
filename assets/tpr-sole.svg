<svg viewBox="0 0 320 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tprGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B4226"/>
      <stop offset="100%" stop-color="#3E2210"/>
    </linearGradient>
    <linearGradient id="tprHighlight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
    <clipPath id="soleClip">
      <path d="M160,28 C205,28 268,62 278,128 L278,210 C278,262 265,292 258,322 C252,352 260,378 268,408 C276,438 248,476 205,488 C176,496 144,496 115,488 C72,476 44,438 52,408 C60,378 68,352 62,322 C55,292 42,262 42,210 L42,128 C52,62 115,28 160,28 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="320" height="540" fill="#F2EDE8"/>

  <!-- Shadow -->
  <ellipse cx="161" cy="512" rx="112" ry="14" fill="rgba(0,0,0,0.18)"/>

  <!-- Sole body -->
  <path d="M160,28 C205,28 268,62 278,128 L278,210 C278,262 265,292 258,322 C252,352 260,378 268,408 C276,438 248,476 205,488 C176,496 144,496 115,488 C72,476 44,438 52,408 C60,378 68,352 62,322 C55,292 42,262 42,210 L42,128 C52,62 115,28 160,28 Z"
    fill="url(#tprGrad)" filter="url(#shadow)"/>

  <!-- Herringbone tread pattern -->
  <g clip-path="url(#soleClip)" fill="none" stroke="#4A2C15" stroke-width="3.5" stroke-linecap="round" opacity="0.55">
    <!-- Row 1 - toe area -->
    <polyline points="90,70 120,50 150,70 180,50 210,70 240,50"/>
    <polyline points="90,90 120,70 150,90 180,70 210,90 240,70"/>
    <!-- Row 2 -->
    <polyline points="80,120 115,98 150,120 185,98 220,120 255,98"/>
    <polyline points="80,142 115,120 150,142 185,120 220,142 255,120"/>
    <!-- Row 3 -->
    <polyline points="75,172 115,148 150,172 185,148 225,172 262,148"/>
    <polyline points="75,194 115,170 150,194 185,170 225,194 262,170"/>
    <!-- Row 4 - waist -->
    <polyline points="78,224 115,200 150,224 185,200 222,224 258,200"/>
    <polyline points="78,246 115,222 150,246 185,222 222,246 258,222"/>
    <!-- Row 5 -->
    <polyline points="80,278 116,254 150,278 184,254 220,278 256,254"/>
    <polyline points="80,300 116,276 150,300 184,276 220,300 256,276"/>
    <!-- Row 6 -->
    <polyline points="82,332 116,308 150,332 184,308 218,332 252,308"/>
    <polyline points="82,354 116,330 150,354 184,330 218,354 252,330"/>
    <!-- Row 7 - heel -->
    <polyline points="88,386 120,362 150,386 180,362 212,386 244,362"/>
    <polyline points="90,408 122,384 150,408 178,384 210,408 242,384"/>
    <polyline points="98,438 128,414 150,438 172,414 202,438 230,414"/>
    <polyline points="105,460 132,440 150,460 168,440 195,460 220,440"/>
  </g>

  <!-- Side highlight -->
  <path d="M160,28 C205,28 268,62 278,128 L278,280 C265,260 260,230 258,200 C255,165 262,130 255,95 C248,60 205,36 160,34 Z"
    fill="url(#tprHighlight)"/>

  <!-- Outer border -->
  <path d="M160,28 C205,28 268,62 278,128 L278,210 C278,262 265,292 258,322 C252,352 260,378 268,408 C276,438 248,476 205,488 C176,496 144,496 115,488 C72,476 44,438 52,408 C60,378 68,352 62,322 C55,292 42,262 42,210 L42,128 C52,62 115,28 160,28 Z"
    fill="none" stroke="#2A1508" stroke-width="4" opacity="0.6"/>

  <!-- Label badge -->
  <rect x="105" y="500" width="110" height="28" rx="14" fill="#3E2210" opacity="0.85"/>
  <text x="160" y="519" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#fff" letter-spacing="3">TPR</text>
</svg>
