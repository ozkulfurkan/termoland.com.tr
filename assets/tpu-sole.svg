<svg viewBox="0 0 320 540" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tpuGrad" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="rgba(180,220,255,0.55)"/>
      <stop offset="50%" stop-color="rgba(140,195,240,0.45)"/>
      <stop offset="100%" stop-color="rgba(100,165,220,0.60)"/>
    </linearGradient>
    <linearGradient id="tpuEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(180,220,255,0.9)"/>
      <stop offset="50%" stop-color="rgba(220,240,255,0.6)"/>
      <stop offset="100%" stop-color="rgba(160,205,245,0.9)"/>
    </linearGradient>
    <linearGradient id="tpuShine" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="tpuBlur">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur"/>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="rgba(80,140,200,0.3)"/>
    </filter>
    <clipPath id="tpuClip">
      <path d="M160,28 C205,28 268,62 278,128 L278,210 C278,262 265,292 258,322 C252,352 260,378 268,408 C276,438 248,476 205,488 C176,496 144,496 115,488 C72,476 44,438 52,408 C60,378 68,352 62,322 C55,292 42,262 42,210 L42,128 C52,62 115,28 160,28 Z"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="320" height="540" fill="#EAF3FC"/>

  <!-- Shadow -->
  <ellipse cx="161" cy="512" rx="112" ry="14" fill="rgba(80,140,200,0.2)"/>

  <!-- Sole body — transparent effect -->
  <path d="M160,28 C205,28 268,62 278,128 L278,210 C278,262 265,292 258,322 C252,352 260,378 268,408 C276,438 248,476 205,488 C176,496 144,496 115,488 C72,476 44,438 52,408 C60,378 68,352 62,322 C55,292 42,262 42,210 L42,128 C52,62 115,28 160,28 Z"
    fill="url(#tpuGrad)" filter="url(#shadow2)"/>

  <!-- Internal linear tread lines (visible through transparency) -->
  <g clip-path="url(#tpuClip)" stroke="rgba(80,150,220,0.45)" stroke-width="2.5" fill="none">
    <!-- Horizontal parallel lines across the sole -->
    <line x1="50" y1="75"  x2="270" y2="75"/>
    <line x1="48" y1="100" x2="272" y2="100"/>
    <line x1="46" y1="125" x2="274" y2="125"/>
    <line x1="45" y1="150" x2="275" y2="150"/>
    <line x1="44" y1="175" x2="276" y2="175"/>
    <line x1="44" y1="200" x2="276" y2="200"/>
    <line x1="44" y1="225" x2="276" y2="225"/>
    <line x1="44" y1="250" x2="276" y2="250"/>
    <line x1="45" y1="275" x2="275" y2="275"/>
    <line x1="46" y1="300" x2="274" y2="300"/>
    <line x1="48" y1="325" x2="272" y2="325"/>
    <line x1="50" y1="350" x2="270" y2="350"/>
    <line x1="54" y1="375" x2="266" y2="375"/>
    <line x1="58" y1="400" x2="262" y2="400"/>
    <line x1="66" y1="425" x2="254" y2="425"/>
    <line x1="78" y1="450" x2="242" y2="450"/>
    <line x1="96" y1="470" x2="224" y2="470"/>
  </g>

  <!-- Vertical center spine -->
  <line x1="160" y1="40" x2="160" y2="488" stroke="rgba(80,150,220,0.3)" stroke-width="2" clip-path="url(#tpuClip)"/>

  <!-- Shine / glass reflection -->
  <path d="M160,28 C190,28 245,55 262,110 L262,240 C245,220 238,195 236,165 C232,130 240,100 234,72 C224,48 192,32 160,30 Z"
    fill="url(#tpuShine)"/>

  <!-- Outer border — glassy edge -->
  <path d="M160,28 C205,28 268,62 278,128 L278,210 C278,262 265,292 258,322 C252,352 260,378 268,408 C276,438 248,476 205,488 C176,496 144,496 115,488 C72,476 44,438 52,408 C60,378 68,352 62,322 C55,292 42,262 42,210 L42,128 C52,62 115,28 160,28 Z"
    fill="none" stroke="url(#tpuEdge)" stroke-width="5" opacity="0.9"/>

  <!-- Label badge -->
  <rect x="105" y="500" width="110" height="28" rx="14" fill="#3A82C4" opacity="0.85"/>
  <text x="160" y="519" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="800" fill="#fff" letter-spacing="3">TPU</text>
</svg>
